# ===================================================================
# CORE APPLICATION CONFIGURATION
# ===================================================================
spring.application.name=shoestore

# ===================================================================
# DATABASE & JPA CONFIGURATION
# ===================================================================
# Datasource Connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate & JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================================================================
# SECURITY & THIRD-PARTY AUTH (JWT & GOOGLE)
# ===================================================================
# Internal JWT (Access Token: 15m | Refresh Token: 7d)
jwt.secret-key=${JWT_SECRET_KEY}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Google OAuth2 Login
google.client-id=${GOOGLE_CLIENT_ID}

# ===================================================================
# CACHING INFRASTRUCTURE (REDIS)
# ===================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=HoangAnhShoeStore2026
spring.data.redis.timeout=60000

# ===================================================================
# MAIL INFRASTRUCTURE (SMTP GMAIL)
# ===================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===================================================================
# CLOUDINARY STORAGE CONFIGURATION
# ===================================================================
shoestore.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
shoestore.cloudinary.api-key=${CLOUDINARY_API_KEY}
shoestore.cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Config max file upload (Max: 2MB)
shoestore.media.max-file-size=2097152
shoestore.media.allowed-types=image/jpeg,image/png,image/webp

# ===================================================================
# SYSTEM DIAGNOSTICS & LOGGING
# ===================================================================
logging.level.org.hibernate.SQL=DEBUG